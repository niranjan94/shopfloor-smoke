name: Shopfloor Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Mutually exclusive with shopfloor.yml. Shopfloor-authored stage PRs carry
    # `Shopfloor-Stage:` in the body (set by src/github/adapter.ts) and are
    # reviewed by the full pipeline; this review-only workflow fires on every
    # other PR. Gating at the job level (not uses:) means the action is
    # simply skipped on Shopfloor-authored PRs without firing.
    if: "!contains(github.event.pull_request.body, 'Shopfloor-Stage:')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Review-only mode runs against human-authored PRs. GITHUB_TOKEN is fine
    # for the primary (read-only) surface, but it cannot APPROVE / REQUEST_CHANGES
    # on any PR (GitHub blocks github-actions[bot] from reviewing). The review
    # surface must use the review App so the verdict can post a proper review.
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run Shopfloor (review only)
        uses: niranjan94/shopfloor@v2
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          github_app_review_client_id: ${{ secrets.SHOPFLOOR_GITHUB_APP_REVIEW_CLIENT_ID }}
          github_app_review_private_key: ${{ secrets.SHOPFLOOR_GITHUB_APP_REVIEW_PRIVATE_KEY }}
          review_only: "true"
