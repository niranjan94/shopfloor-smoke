name: Shopfloor Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Mutually exclusive with shopfloor.yml. Shopfloor-authored stage PRs carry
    # `Shopfloor-Stage:` in the body (set by src/github/adapter.ts) and are
    # reviewed by the full pipeline; this review-only workflow fires on every
    # other PR. Gating at the job level (not uses:) means the action is
    # simply skipped on Shopfloor-authored PRs without firing.
    if: "!contains(github.event.pull_request.body, 'Shopfloor-Stage:')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Review-only mode runs against human-authored PRs and never advances a
    # Shopfloor pipeline, so the workflow's default GITHUB_TOKEN is enough:
    # the cascading-trigger limitation (no downstream workflows fire) is moot
    # because there is nothing downstream, and the self-PR rule (github-
    # actions[bot] cannot review its own PR) does not apply because the PR
    # author is the human. Write scopes are needed for pulls.createReview and
    # repos.createCommitStatus only.
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run Shopfloor (review only)
        uses: niranjan94/shopfloor@v2
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          review_only: "true"
